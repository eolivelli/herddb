name: Java CI
on:
  pull_request:
  push:
    branches:
      - master
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
env:
  MAVEN_OPTS: -Dmaven.artifact.threads=4 -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn  -Dmaven.wagon.httpconnectionManager.ttlSeconds=25 -Dmaven.wagon.http.retryHandler.count=3
jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: 'Set up JDK 25'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: 'Cache Maven packages'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: 'cache'
          restore-keys: 'cache'
      - name: 'Checkout jvector'
        uses: actions/checkout@v4
        with:
          repository: eolivelli/jvector
          ref: feature/bytebuffer-zero-copy-vectors
          path: jvector
      - name: 'Build jvector'
        run: mvn -B install -DskipTests -Drat.skip=true --file jvector/pom.xml && rm -rf jvector
      - name: 'Build with Maven (with checkstyle, rat, spotbugs)'
        run: mvn -B checkstyle:check apache-rat:check install -DskipTests spotbugs:check -Dmaven.test.redirectTestOutputToFile=true -Dherddb.file.requirefsync=false --file pom.xml -Pci
      - name: 'Upload build artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-artifacts
          path: |
            ~/.m2/repository/org/herddb
            ~/.m2/repository/io/github/jbellis
          retention-days: 1
      - name: 'Remove Snapshots Before Caching'
        run: find ~/.m2 -name '*SNAPSHOT' | xargs rm -Rf

  test-core:
    name: HerdDB Core tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: 'Set up JDK 25'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: 'Cache Maven packages'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: 'cache'
          restore-keys: 'cache'
      - name: 'Download build artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-build-artifacts
          path: ~/.m2/repository
      - name: 'Test herddb-core (non-cluster)'
        run: mvn -B verify -DforkCount=2 -Dtest.excludedGroups=herddb.core.ClusterTest -Dmaven.test.redirectTestOutputToFile=true -Dherddb.file.requirefsync=false --file pom.xml -pl herddb-core -Pci
      - name: 'Upload surefire reports'
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-core
          path: |
            **/target/surefire-reports/**
            **/hs_err_pid*.log
          retention-days: 7
          if-no-files-found: ignore

  test-cluster:
    name: HerdDB Core Cluster tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: 'Set up JDK 25'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: 'Cache Maven packages'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: 'cache'
          restore-keys: 'cache'
      - name: 'Download build artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-build-artifacts
          path: ~/.m2/repository
      - name: 'Test herddb-core (cluster)'
        run: mvn -B verify -DforkCount=2 -Dtest.groups=herddb.core.ClusterTest -Dmaven.test.redirectTestOutputToFile=true -Dherddb.file.requirefsync=false --file pom.xml -pl herddb-core -Pci
      - name: 'Upload surefire reports'
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-cluster
          path: |
            **/target/surefire-reports/**
            **/hs_err_pid*.log
          retention-days: 7
          if-no-files-found: ignore

  test-other:
    name: Other modules tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: 'Set up JDK 25'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: 'Cache Maven packages'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: 'cache'
          restore-keys: 'cache'
      - name: 'Download build artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-build-artifacts
          path: ~/.m2/repository
      - name: 'Test other modules'
        run: mvn -B verify -Dmaven.test.redirectTestOutputToFile=true -Dherddb.file.requirefsync=false --file pom.xml -Pci -pl !herddb-core,!herddb-remote-file-service,!herddb-indexing-service
      - name: 'Upload surefire reports'
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-other
          path: |
            **/target/surefire-reports/**
            **/hs_err_pid*.log
          retention-days: 7
          if-no-files-found: ignore

  test-remote-file-service:
    name: Remote File Service tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: 'Set up JDK 25'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: 'Cache Maven packages'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: 'cache'
          restore-keys: 'cache'
      - name: 'Download build artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-build-artifacts
          path: ~/.m2/repository
      - name: 'Test herddb-remote-file-service'
        run: mvn -B verify -Dmaven.test.redirectTestOutputToFile=true -Dherddb.file.requirefsync=false --file pom.xml -Pci -pl herddb-remote-file-service
      - name: 'Upload surefire reports'
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-remote-file-service
          path: |
            **/target/surefire-reports/**
            **/hs_err_pid*.log
          retention-days: 7
          if-no-files-found: ignore

  test-indexing-service:
    name: Indexing Service tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: 'Set up JDK 25'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
      - name: 'Cache Maven packages'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: 'cache'
          restore-keys: 'cache'
      - name: 'Download build artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-build-artifacts
          path: ~/.m2/repository
      - name: 'Test herddb-indexing-service'
        run: mvn -B verify -Dmaven.test.redirectTestOutputToFile=true -Dherddb.file.requirefsync=false --file pom.xml -Pci -pl herddb-indexing-service
      - name: 'Upload surefire reports'
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-indexing-service
          path: |
            **/target/surefire-reports/**
            **/hs_err_pid*.log
          retention-days: 7
          if-no-files-found: ignore
