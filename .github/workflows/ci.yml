name: Java CI
on:
  pull_request:
  push:
    branches:
      - master
env:
  MAVEN_OPTS: -Dmaven.artifact.threads=4 -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn  -Dmaven.wagon.httpconnectionManager.ttlSeconds=25 -Dmaven.wagon.http.retryHandler.count=3
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.6.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v2
      - name: 'Set up JDK 22'
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'oracle'
      - name: 'Cache Maven packages'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: 'cache'
          restore-keys: 'cache'
      - name: 'Checkout jvector'
        uses: actions/checkout@v2
        with:
          repository: datastax/jvector
          path: jvector
      - name: 'Build jvector'
        run: mvn -B install -DskipTests -Drat.skip=true --file jvector/pom.xml && rm -rf jvector
      - name: 'Build with Maven'
        run: mvn -B install -DskipTests --file pom.xml -Pjenkins
      - name: 'Upload build artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-artifacts
          path: |
            ~/.m2/repository/org/herddb
            ~/.m2/repository/io/github/jbellis
          retention-days: 1
      - name: 'Remove Snapshots Before Caching'
        run: find ~/.m2 -name '*SNAPSHOT' | xargs rm -Rf

  validation:
    name: Code validation (checkstyle,rat,spotbugs)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: 'Set up JDK 22'
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'oracle'
      - name: 'Cache Maven packages'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: 'cache'
          restore-keys: 'cache'
      - name: 'Download build artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-build-artifacts
          path: ~/.m2/repository
      - name: 'Run validation checks'
        run: mvn -B checkstyle:check apache-rat:check install -DskipTests spotbugs:check -Dmaven.test.redirectTestOutputToFile=true -Dherddb.file.requirefsync=false --file pom.xml -Pjenkins

  test-core:
    name: HerdDB Core tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: 'Set up JDK 22'
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'oracle'
      - name: 'Cache Maven packages'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: 'cache'
          restore-keys: 'cache'
      - name: 'Download build artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-build-artifacts
          path: ~/.m2/repository
      - name: 'Test herddb-core (non-cluster)'
        run: mvn -B verify -DforkCount=2 -Dtest.excludedGroups=herddb.core.ClusterTest -Dmaven.test.redirectTestOutputToFile=true -Dherddb.file.requirefsync=false --file pom.xml -pl herddb-core -Pjenkins

  test-cluster:
    name: HerdDB Core Cluster tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: 'Set up JDK 22'
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'oracle'
      - name: 'Cache Maven packages'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: 'cache'
          restore-keys: 'cache'
      - name: 'Download build artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-build-artifacts
          path: ~/.m2/repository
      - name: 'Test herddb-core (cluster)'
        run: mvn -B verify -DforkCount=2 -Dtest.groups=herddb.core.ClusterTest -Dmaven.test.redirectTestOutputToFile=true -Dherddb.file.requirefsync=false --file pom.xml -pl herddb-core -Pjenkins

  test-other:
    name: Other modules tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: 'Set up JDK 22'
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'oracle'
      - name: 'Cache Maven packages'
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: 'cache'
          restore-keys: 'cache'
      - name: 'Download build artifacts'
        uses: actions/download-artifact@v4
        with:
          name: maven-build-artifacts
          path: ~/.m2/repository
      - name: 'Test other modules'
        run: mvn -B verify -Dmaven.test.redirectTestOutputToFile=true -Dherddb.file.requirefsync=false --file pom.xml -Pjenkins -pl !herddb-core
