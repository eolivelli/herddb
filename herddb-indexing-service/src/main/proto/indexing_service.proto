syntax = "proto3";

option java_package = "herddb.indexing.proto";
option java_outer_classname = "IndexingServiceProto";
option java_multiple_files = true;

package indexing;

service IndexingService {
    rpc Search (SearchRequest) returns (SearchResponse);
    rpc GetIndexStatus (GetIndexStatusRequest) returns (GetIndexStatusResponse);
}

message SearchRequest {
    string tablespace = 1;
    string table = 2;
    string index = 3;
    repeated float vector = 4;
    int32 limit = 5;
    bool return_score = 6;
}

message SearchResult {
    bytes primary_key = 1;
    float score = 2;
}

message SearchResponse {
    repeated SearchResult results = 1;
}

message GetIndexStatusRequest {
    string tablespace = 1;
    string table = 2;
    string index = 3;
}

message GetIndexStatusResponse {
    int64 vector_count = 1;
    int32 segment_count = 2;
    int64 last_lsn_ledger = 3;
    int64 last_lsn_offset = 4;
    string status = 5;
}
