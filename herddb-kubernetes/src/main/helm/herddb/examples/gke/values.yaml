# HerdDB on GKE with Google Cloud Storage (S3-compatible endpoint).
#
# Prerequisites:
#   1. A GKE cluster
#   2. A GCS bucket
#   3. HMAC keys for a service account with access to the bucket
#   4. A Kubernetes Secret with the HMAC credentials:
#
#      kubectl create secret generic herddb-gcs-credentials \
#        --from-literal=S3_ACCESS_KEY=<HMAC-access-key-id> \
#        --from-literal=S3_SECRET_KEY=<HMAC-secret-access-key>
#
#   5. (If using a private GHCR image) A docker-registry Secret:
#
#      kubectl create secret docker-registry ghcr-credentials \
#        --docker-server=ghcr.io \
#        --docker-username=<github-user> \
#        --docker-password=<github-pat>
#
# Install:
#   helm install herddb . -f examples/gke/values.yaml \
#     --set fileServer.s3.bucket=<your-bucket-name>

image:
  pullSecrets:
    - name: ghcr-credentials

server:
  mode: cluster
  storageMode: remote
  replicaCount: 1
  javaOpts: "-Xms16g -Xmx16g -Djava.net.preferIPv4Stack=true"
  storage:
    data:
      size: 10Gi
    commitlog:
      size: 5Gi
  resources:
    requests:
      memory: "20Gi"
      cpu: "8"
    limits:
      memory: "20Gi"
      cpu: "8"

fileServer:
  replicaCount: 1
  javaOpts: "-Xms12g -Xmx12g -Djava.net.preferIPv4Stack=true"
  storageMode: s3
  s3:
    endpoint: "https://storage.googleapis.com"
    region: "auto"
    # Bucket name — must be provided at install time via --set
    bucket: ""
    # Credentials are read from this Kubernetes Secret instead of
    # being embedded in the ConfigMap.
    credentialsSecret: "herddb-gcs-credentials"
    # Local disk cache — sized to match the PVC (150 Gi = 161061273600 bytes)
    cacheMaxBytes: 161061273600
  storage:
    size: 200Gi
  resources:
    requests:
      memory: "16Gi"
      cpu: "8"
    limits:
      memory: "16Gi"
      cpu: "8"

minio:
  enabled: false

zookeeper:
  enabled: true
  javaOpts: "-Xms2g -Xmx2g -Djava.net.preferIPv4Stack=true"
  storage:
    size: 10Gi
  resources:
    requests:
      memory: "4Gi"
      cpu: "4"
    limits:
      memory: "4Gi"
      cpu: "4"

bookkeeper:
  enabled: true
  replicaCount: 1
  javaOpts: "-Xms6g -Xmx6g -Djava.net.preferIPv4Stack=true"
  extraConfig:
    journalWriteData: "false"
  storage:
    journal:
      size: 1Gi
    ledger:
      size: 500Gi
  resources:
    requests:
      memory: "8Gi"
      cpu: "4"
    limits:
      memory: "8Gi"
      cpu: "4"

indexingService:
  enabled: true
  storageMode: remote
  replicaCount: 2
  javaOpts: "-Xms24g -Xmx24g -Djava.net.preferIPv4Stack=true"
  storage:
    data:
      size: 20Gi
    log:
      size: 5Gi
  resources:
    requests:
      memory: "32Gi"
      cpu: "16"
    limits:
      memory: "32Gi"
      cpu: "16"

tools:
  enabled: true
  storage:
    datasets:
      size: 200Gi

prometheus:
  enabled: true

grafana:
  enabled: true
