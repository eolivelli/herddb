# HerdDB on GKE with Google Cloud Storage (S3-compatible endpoint).
#
# Prerequisites:
#   1. A GKE cluster
#   2. A GCS bucket
#   3. HMAC keys for a service account with access to the bucket
#   4. A Kubernetes Secret with the HMAC credentials:
#
#      kubectl create secret generic herddb-gcs-credentials \
#        --from-literal=S3_ACCESS_KEY=<HMAC-access-key-id> \
#        --from-literal=S3_SECRET_KEY=<HMAC-secret-access-key>
#
#   5. (If using a private GHCR image) A docker-registry Secret:
#
#      kubectl create secret docker-registry ghcr-credentials \
#        --docker-server=ghcr.io \
#        --docker-username=<github-user> \
#        --docker-password=<github-pat>
#
# Install:
#   helm install herddb . -f examples/gke/values.yaml \
#     --set fileServer.s3.bucket=<your-bucket-name>

image:
  # Always re-pull so that re-pushed tags (common during active
  # benchmark iteration) are picked up on every pod restart.
  pullPolicy: Always
  pullSecrets:
    - name: ghcr-credentials

server:
  mode: cluster
  storageMode: remote
  replicaCount: 1
  javaOpts: "-Xms20g -Xmx20g -Djava.net.preferIPv4Stack=true --add-modules jdk.incubator.vector -Dio.netty.maxDirectMemory=0 -XX:MaxDirectMemorySize=1g"
  storage:
    data:
      size: 10Gi
    commitlog:
      size: 5Gi
  extraConfig:
    # --- BookKeeper commit-log tuning (experiment for issues #141 / #145) ---
    # Default max ledger size is 1 GiB (ServerConfiguration.PROPERTY_BOOKKEEPER_LEDGERS_MAX_SIZE).
    # At bigann's ~200 B/entry that is ~5–7 M INSERTs per ledger, so by the
    # time the scheduled checkpoint fires (~15 min) the cluster has a handful
    # of fat ledgers pinned on the single bookie. Force more frequent
    # rollovers so each ledger is smaller and can be dropped sooner.
    server.bookkeeper.ledgers.max.size: "134217728"            # 128 MiB
    # Default retention is 2 days (1000*60*60*24*2 ms). On a typical bench
    # run that's "never" — closed ledgers pile up on the bookie's ledgers PVC
    # and keep per-ledger state alive in the bookie's memtable/file-handle
    # caches. 5 min is enough to let a checkpoint durably capture the LSN
    # before cleanup and lets dropOldLedgers actually prune between checkpoints.
    server.bookkeeper.ledgers.retention.period: "300000"       # 5 min (ms)
    # The server enforces (checkpoint.period < retention.period / 2), so a
    # 5-min retention requires a checkpoint period < 150 s. Default is 15 min,
    # which would fail validation. Drop to 1 min — more frequent checkpoints
    # also reduce the per-checkpoint catch-up backlog that was the root cause
    # of issue #145 (LSN mismatch after a 25-min waitForInstanceCatchUp).
    server.checkpoint.period: "60000"                          # 1 min (ms)
  resources:
    requests:
      memory: "23Gi"
      cpu: "8"
    limits:
      memory: "23Gi"
      cpu: "8"

fileServer:
  replicaCount: 2
  javaOpts: "-Xms12g -Xmx12g -Djava.net.preferIPv4Stack=true -Dio.netty.maxDirectMemory=0 -XX:MaxDirectMemorySize=3g"
  storageMode: s3
  s3:
    endpoint: "https://storage.googleapis.com"
    region: "auto"
    # Bucket name — must be provided at install time via --set
    bucket: ""
    # Credentials are read from this Kubernetes Secret instead of
    # being embedded in the ConfigMap.
    credentialsSecret: "herddb-gcs-credentials"
    # On-disk cache limit: maximum bytes the file server may keep in its
    # local disk cache (backed by the PVC below). This is NOT an in-memory
    # cache — pages are stored on the PVC's block device and evicted to GCS
    # when the limit is reached. Set it slightly below the PVC size to leave
    # headroom for temporary write buffers.  150 Gi = 161061273600 bytes.
    cacheMaxBytes: 161061273600
  storage:
    size: 200Gi
  resources:
    requests:
      memory: "16Gi"
      cpu: "8"
    limits:
      memory: "16Gi"
      cpu: "8"

minio:
  enabled: false

zookeeper:
  enabled: true
  javaOpts: "-Xms2g -Xmx2g -Djava.net.preferIPv4Stack=true -Dio.netty.maxDirectMemory=0 -XX:MaxDirectMemorySize=512m"
  storage:
    size: 10Gi
  resources:
    requests:
      memory: "4Gi"
      cpu: "4"
    limits:
      memory: "4Gi"
      cpu: "4"

bookkeeper:
  enabled: true
  replicaCount: 1
  javaOpts: "-Xms6g -Xmx6g -Djava.net.preferIPv4Stack=true -Dio.netty.maxDirectMemory=0 -XX:MaxDirectMemorySize=1g"
  # Journal PVC raised to 100 Gi (from 1 Gi) for long-running bigann ingests.
  # journalWriteData was previously set to "false" to reduce journal I/O;
  # removed here so the bookie journals payload data (safer durability, and
  # we now have plenty of PVC headroom).
  storage:
    journal:
      size: 100Gi
    ledger:
      size: 500Gi
  resources:
    requests:
      memory: "8Gi"
      cpu: "4"
    limits:
      memory: "8Gi"
      cpu: "4"

indexingService:
  enabled: true
  storageMode: remote
  replicaCount: 2
  javaOpts: "-Xms24g -Xmx24g -Djava.net.preferIPv4Stack=true -Dio.netty.maxDirectMemory=0 -XX:MaxDirectMemorySize=2g -Dio.netty.allocator.numDirectArenas=16"
  storage:
    data:
      size: 20Gi
    log:
      size: 5Gi
  resources:
    requests:
      memory: "32Gi"
      cpu: "16"
    limits:
      memory: "32Gi"
      cpu: "16"

tools:
  enabled: true
  gcs:
    credentialsSecret: "herddb-gcs-credentials"
    # Shared bucket of reusable benchmark datasets. The tools pod
    # gets VECTORBENCH_DATASETS_BUCKET=gs://herddb-datasets, which
    # run-bench.sh and the herddb-gke-bench agent use as the default
    # prefix for custom --dataset-url values. Standard presets
    # (sift1m, gist1m, …) still resolve through DatasetLoader's
    # built-in public URLs.
    datasetsBucket: "herddb-datasets"
  storage:
    datasets:
      size: 200Gi

prometheus:
  enabled: false

grafana:
  enabled: false
