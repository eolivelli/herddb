# HerdDB on GKE with Google Cloud Storage (S3-compatible endpoint).
#
# Prerequisites:
#   1. A GKE cluster
#   2. A GCS bucket
#   3. HMAC keys for a service account with access to the bucket
#   4. A Kubernetes Secret with the HMAC credentials:
#
#      kubectl create secret generic herddb-gcs-credentials \
#        --from-literal=S3_ACCESS_KEY=<HMAC-access-key-id> \
#        --from-literal=S3_SECRET_KEY=<HMAC-secret-access-key>
#
# Install:
#   helm install herddb . -f examples/gke/values.yaml \
#     --set fileServer.s3.bucket=<your-bucket-name>

server:
  mode: cluster
  storageMode: remote
  replicaCount: 1
  storage:
    data:
      size: 10Gi
    commitlog:
      size: 5Gi
  resources:
    requests:
      memory: "20Gi"
      cpu: "8"
    limits:
      memory: "20Gi"

fileServer:
  replicaCount: 2
  storageMode: s3
  s3:
    endpoint: "https://storage.googleapis.com"
    region: "auto"
    # Bucket name — must be provided at install time via --set
    bucket: ""
    # Credentials are read from this Kubernetes Secret instead of
    # being embedded in the ConfigMap.
    credentialsSecret: "herddb-gcs-credentials"
  storage:
    size: 200Gi
  resources:
    requests:
      memory: "16Gi"
      cpu: "8"
    limits:
      memory: "16Gi"

minio:
  enabled: false

zookeeper:
  enabled: true
  storage:
    size: 10Gi
  resources:
    requests:
      memory: "4Gi"
      cpu: "4"
    limits:
      memory: "4Gi"

bookkeeper:
  enabled: true
  replicaCount: 1
  storage:
    journal:
      size: 500Gi
    ledger:
      size: 500Gi
  resources:
    requests:
      memory: "8Gi"
      cpu: "4"
    limits:
      memory: "8Gi"

indexingService:
  enabled: true
  replicaCount: 2
  storage:
    data:
      size: 20Gi
    log:
      size: 5Gi
  resources:
    requests:
      memory: "32Gi"
      cpu: "16"
    limits:
      memory: "32Gi"

tools:
  enabled: true

vectorBench:
  enabled: false
