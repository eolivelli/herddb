# Full-stack HerdDB on a local k3s-in-docker cluster.
#
# Deploys: HerdDB server (cluster mode, remote storage) + file server
# (S3 on MinIO) + indexing service + ZooKeeper + BookKeeper + MinIO +
# tools pod.
#
# Mirrors the structure of examples/gke/values.yaml but with resources
# and PVCs sized for a developer laptop / workstation.
#
# Prometheus and Grafana are disabled by default to save RAM; enable them
# ad-hoc with --set prometheus.enabled=true --set grafana.enabled=true.
#
# File-server and indexing-service heap are sized for large-scale vector
# benchmarks (e.g. gist1m / sift1m with 1M × 960-dim vectors). The
# file-server needs ≥ 4 g because a single 960-dim segment can reach
# ~1.2 GB of raw float data and the CachingObjectStorage reads it into
# the JVM heap during compaction.
#
# Server heap raised to 12 g: sift10m background activator checkpoint
# serializes all 5,257+ dirty pages (~1 MiB each via VisibleByteArrayOutputStream)
# during a full 10M-row flush; 8 g was insufficient (issue #111).
# 12 g heap + 1 GiB JVM overhead → 13 GiB container memory.
#
# Tools heap raised to 2 g: loading the sift1m base set (1M × 128 × 4 B
# = 512 MB) into the vector-bench JVM plus JVM overhead exceeds 512 Mi;
# the old 512 Mi container limit caused OOMKill during ingest.
#
# File-server cache and MinIO storage are sized to hold the complete
# index + data pages for gist1m M=32 without any MinIO round-trips on
# warm queries:
#   - gist1m data pages  : ~3.7 GB (1M × 960-dim rows via remote storage)
#   - gist1m M=32 segment: ~4.8 GB (FusedPQ graph)
#   - sift1m  M=32 segment: ~0.8 GB
#   Peak single-run total: ≈ 8.5 GB → 30 GiB cache/PVC gives ~3.5× headroom.
#
# Install via ./install.sh (which runs k3s inside a Docker container
# and imports the HerdDB image into containerd so imagePullPolicy=Never
# works).

image:
  pullPolicy: Never

server:
  mode: cluster
  storageMode: remote
  replicaCount: 1
  # Heap raised to 20 g for bigann 100M-vector workload.
  # bigann produces ~52,570 dirty pages (~52.5 GiB checkpoint buffer allocations);
  # 10 g caused GC-pause connection drop on sift10m (5,257 pages), 12 g survived
  # sift10m. 20 g gives headroom for the 10× larger bigann checkpoint.
  # 20 g heap + 1 GiB JVM overhead → 21 GiB container memory.
  javaOpts: "-Xms20g -Xmx20g -Djava.net.preferIPv4Stack=true"
  storage:
    data:
      size: 5Gi
    commitlog:
      size: 2Gi
  extraConfig:
    indexing.service.timeout: "300"
  resources:
    requests:
      memory: "21Gi"
      cpu: "2"
    limits:
      memory: "21Gi"
      cpu: "2"

fileServer:
  replicaCount: 1
  storageMode: s3
  javaOpts: "-Xms4g -Xmx4g -Djava.net.preferIPv4Stack=true"
  # S3 endpoint, bucket, and credentials are auto-wired from the
  # minio section below.
  s3:
    # Local disk cache raised to 200 GiB (214748364800 bytes) for bigann 10M
    # benchmarks. The bigann 10M index (M=16, FusedPQ) produces ~218 segments
    # totalling ~196 GiB of file-server reads — the previous 30 GiB cache was
    # exhausted early in the query phase, causing p999 read latencies of 15.5s
    # as reads fell through to MinIO (see issue #118).
    # NOTE: this key must be under fileServer.s3 — the template reads
    # .Values.fileServer.s3.cacheMaxBytes (not .Values.fileServer.cacheMaxBytes).
    cacheMaxBytes: 214748364800
  storage:
    # 200 GiB: sized to hold the full bigann 10M segment data in the local
    # disk cache without any MinIO fallback on warm queries.
    size: 200Gi
  resources:
    requests:
      memory: "5Gi"
      cpu: "0.5"
    limits:
      memory: "5Gi"
      cpu: "1"

minio:
  enabled: true
  storage:
    # 200 GiB: sized for bigann 10M HNSW segments (~196 GiB observed during
    # the 2026-04-16 benchmark run). Previous 20 GiB was sufficient for smaller
    # datasets (gist1m, sift1m, sift10k) but bigann 10M fills it entirely.
    size: 200Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "0.25"
    limits:
      memory: "512Mi"
      cpu: "0.5"

zookeeper:
  enabled: true
  javaOpts: "-Xms512m -Xmx512m -Djava.net.preferIPv4Stack=true"
  storage:
    size: 2Gi
  resources:
    requests:
      memory: "768Mi"
      cpu: "0.25"
    limits:
      memory: "768Mi"
      cpu: "0.5"

bookkeeper:
  enabled: true
  replicaCount: 1
  javaOpts: "-Xms512m -Xmx512m -Djava.net.preferIPv4Stack=true"
  extraConfig:
    journalWriteData: "false"
  storage:
    journal:
      size: 1Gi
    ledger:
      size: 10Gi
  resources:
    requests:
      memory: "1Gi"
      cpu: "0.25"
    limits:
      memory: "1Gi"
      cpu: "0.5"

indexingService:
  enabled: true
  storageMode: remote
  replicaCount: 1
  # Heap raised to 9 g: sift10m builds 221 FusedPQ segments (~17 GB total graph
  # data); with 5 g the IS had to evict/reload segments on every query causing
  # ~25s/query. 9 g allows more segments resident in memory simultaneously,
  # which should significantly reduce query latency.
  # 9 g heap + 1 GiB JVM overhead → 10 GiB container memory.
  # Netty memory tuning: io.netty.maxDirectMemory=0 respects -XX:MaxDirectMemorySize cap
  # instead of defaulting to heap size; 512m cap is sufficient for gRPC messages.
  # numDirectArenas=16 spreads Netty allocations to reduce lock contention (issue #122).
  javaOpts: "-Xms9g -Xmx9g -Djava.net.preferIPv4Stack=true --add-modules jdk.incubator.vector -Dio.netty.maxDirectMemory=0 -XX:MaxDirectMemorySize=512m -Dio.netty.allocator.numDirectArenas=16"
  storage:
    data:
      size: 5Gi
    log:
      size: 2Gi
  resources:
    requests:
      memory: "10Gi"
      cpu: "4"
    limits:
      memory: "10Gi"
      cpu: "4"

tools:
  enabled: true
  storage:
    datasets:
      size: 10Gi
  # Heap raised to 6 g: sift10m base set (10M × 128-dim × 4 B = 5.12 GB)
  # must fit in JVM heap during ingest. Container limit = heap + ~1 GiB overhead.
  javaOpts: "-Xms512m -Xmx6g -Djava.net.preferIPv4Stack=true"
  resources:
    requests:
      memory: "7Gi"
      cpu: "0.5"
    limits:
      memory: "7Gi"
      cpu: "1"

prometheus:
  # Disabled by default to save ~512 Mi RAM during vector benchmarks.
  # Re-enable with: --set prometheus.enabled=true
  enabled: false
  storage:
    size: 1Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "0.1"
    limits:
      memory: "512Mi"
      cpu: "0.25"

grafana:
  # Disabled by default to save ~256 Mi RAM during vector benchmarks.
  # Re-enable with: --set grafana.enabled=true
  enabled: false
  resources:
    requests:
      memory: "128Mi"
      cpu: "0.1"
    limits:
      memory: "256Mi"
      cpu: "0.25"
