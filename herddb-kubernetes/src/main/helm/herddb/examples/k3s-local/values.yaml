# Full-stack HerdDB on a local k3s-in-docker cluster.
#
# Deploys: HerdDB server (cluster mode, remote storage) + file server
# (S3 on MinIO) + indexing service + ZooKeeper + BookKeeper + MinIO +
# tools pod.
#
# Mirrors the structure of examples/gke/values.yaml but with resources
# and PVCs sized for a developer laptop / workstation.
#
# Prometheus and Grafana are disabled by default to save RAM; enable them
# ad-hoc with --set prometheus.enabled=true --set grafana.enabled=true.
#
# File-server and indexing-service heap are sized for large-scale vector
# benchmarks (e.g. gist1m / sift1m with 1M × 960-dim vectors). The
# file-server needs ≥ 4 g because a single 960-dim segment can reach
# ~1.2 GB of raw float data and the CachingObjectStorage reads it into
# the JVM heap during compaction.
#
# Server heap raised to 2 g: checkpointing 1M rows × 128-dim vectors
# requires ~1.5 GB peak heap for dirty-page serialisation; the old
# 1 g heap caused OOM in flushNewPageForCheckpoint.
#
# Tools heap raised to 2 g: loading the sift1m base set (1M × 128 × 4 B
# = 512 MB) into the vector-bench JVM plus JVM overhead exceeds 512 Mi;
# the old 512 Mi container limit caused OOMKill during ingest.
#
# File-server two-tier cache (L1 heap + L2 disk):
#   CachingObjectStorage keeps hot blocks in JVM heap (L1, bounded by
#   s3.cacheMaxBytes) and retains disk copies when items are evicted from heap
#   (L2).  On a Caffeine miss the loader reads from disk first (~GB/s) and
#   only falls back to MinIO (~4 MB/s in Docker) when the disk file is absent.
#   s3.cacheMaxBytes controls the L1 heap allocation; the PVC holds the L2
#   disk files (retained across evictions, cleared only on pod restart).
#
#   Sizing for sift1m M=8 through gist1m M=32:
#   - sift1m M=8  graph : ~280 MB across ~7 segments
#   - gist1m M=32 graph : ~4.8 GB across ~7 segments
#   - gist1m data pages : ~3.7 GB
#   Peak L1 demand      : ~5 GB → 6 GiB L1 gives ~1.2× headroom
#   Peak L2 disk demand : ~8.5 GB → 50 GiB PVC gives ~6× headroom
#
# Install via ./install.sh (which runs k3s inside a Docker container
# and imports the HerdDB image into containerd so imagePullPolicy=Never
# works).

image:
  pullPolicy: Never

server:
  mode: cluster
  storageMode: remote
  replicaCount: 1
  javaOpts: "-Xms1g -Xmx2g -Djava.net.preferIPv4Stack=true"
  storage:
    data:
      size: 5Gi
    commitlog:
      size: 2Gi
  # Raise the gRPC deadline for server→indexing-service calls from the
  # default 30 s to 300 s (5 min).  On a local k3s-in-Docker cluster,
  # MinIO throughput is ~4 MB/s, so cold-loading the 208 MB FusedPQ graph
  # for a sift1m segment takes ~52 s — far beyond the 30 s default and
  # causing every query to fail with DEADLINE_EXCEEDED on first search.
  extraConfig:
    indexing.service.timeout: "300"
  resources:
    requests:
      memory: "3Gi"
      cpu: "0.5"
    limits:
      memory: "3Gi"
      cpu: "1"

fileServer:
  replicaCount: 1
  storageMode: s3
  # Heap raised to 8 g: CachingObjectStorage L1 heap cache (6 GiB) plus JVM
  # overhead requires ~8 GB.  The previous 4 g heap caused OOM when multiple
  # concurrent queries each held a 200+ MB graph block in the Caffeine cache
  # and cacheMaxBytes was set larger than the available heap.
  javaOpts: "-Xms2g -Xmx8g -Djava.net.preferIPv4Stack=true"
  # S3 endpoint, bucket, and credentials are auto-wired from the
  # minio section below.
  s3:
    # L1 heap cache: 6 GiB — Caffeine evicts entries from heap once total
    # weight exceeds this value.  Evicted entries are retained on disk (L2)
    # so subsequent reads hit local disk instead of MinIO.
    # NOTE: this key must be under fileServer.s3 — the Helm template reads
    # .Values.fileServer.s3.cacheMaxBytes (not .Values.fileServer.cacheMaxBytes).
    cacheMaxBytes: 6442450944
  storage:
    # 50 GiB L2 disk cache: holds the complete gist1m index (~4.8 GB) plus
    # data pages (~3.7 GB) with ~5× headroom.  Entries survive heap eviction
    # and are only cleared on pod restart.
    size: 50Gi
  resources:
    requests:
      memory: "9Gi"
      cpu: "0.5"
    limits:
      memory: "10Gi"
      cpu: "1"

minio:
  enabled: true
  storage:
    # 20 GiB: holds gist1m data (~8.5 GB) plus multiple benchmark runs
    # without running out of object-storage space.
    size: 20Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "0.25"
    limits:
      memory: "512Mi"
      cpu: "0.5"

zookeeper:
  enabled: true
  javaOpts: "-Xms512m -Xmx512m -Djava.net.preferIPv4Stack=true"
  storage:
    size: 2Gi
  resources:
    requests:
      memory: "768Mi"
      cpu: "0.25"
    limits:
      memory: "768Mi"
      cpu: "0.5"

bookkeeper:
  enabled: true
  replicaCount: 1
  javaOpts: "-Xms512m -Xmx512m -Djava.net.preferIPv4Stack=true"
  extraConfig:
    journalWriteData: "false"
  storage:
    journal:
      size: 1Gi
    ledger:
      size: 5Gi
  resources:
    requests:
      memory: "1Gi"
      cpu: "0.25"
    limits:
      memory: "1Gi"
      cpu: "0.5"

indexingService:
  enabled: true
  storageMode: remote
  replicaCount: 1
  # Heap raised to 3 g for extra GC headroom during large-dataset compaction
  # coordination (was 2 g).
  javaOpts: "-Xms2g -Xmx3g -Djava.net.preferIPv4Stack=true --add-modules jdk.incubator.vector"
  storage:
    data:
      size: 5Gi
    log:
      size: 2Gi
  resources:
    requests:
      memory: "4Gi"
      cpu: "0.5"
    limits:
      memory: "4Gi"
      cpu: "1"

tools:
  enabled: true
  storage:
    datasets:
      size: 10Gi
  # Heap raised to 2 g: sift1m base set (512 MB) plus JVM overhead exceeds
  # the old 512 Mi container limit, causing OOMKill during ingest.
  javaOpts: "-Xms512m -Xmx1536m -Djava.net.preferIPv4Stack=true"
  resources:
    requests:
      memory: "2Gi"
      cpu: "0.25"
    limits:
      memory: "2Gi"
      cpu: "0.5"

prometheus:
  # Disabled by default to save ~512 Mi RAM during vector benchmarks.
  # Re-enable with: --set prometheus.enabled=true
  enabled: false
  storage:
    size: 1Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "0.1"
    limits:
      memory: "512Mi"
      cpu: "0.25"

grafana:
  # Disabled by default to save ~256 Mi RAM during vector benchmarks.
  # Re-enable with: --set grafana.enabled=true
  enabled: false
  resources:
    requests:
      memory: "128Mi"
      cpu: "0.1"
    limits:
      memory: "256Mi"
      cpu: "0.25"
