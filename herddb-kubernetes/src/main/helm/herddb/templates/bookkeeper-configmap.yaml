{{- if .Values.bookkeeper.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "herddb.fullname" . }}-bookkeeper-config
  labels:
    {{- include "herddb.labels" . | nindent 4 }}
    app.kubernetes.io/component: bookkeeper
data:
  bookie.properties: |
    zkServers={{ include "herddb.zkAddress" . }}
    zkLedgersRootPath=/ledgers
    bookiePort={{ .Values.bookkeeper.bookiePort }}
    ledgerDirNames=/opt/herddb/bookie-data/ledgers
    journalDirName=/opt/herddb/bookie-data/journal
    httpServerEnabled=true
    httpServerPort={{ .Values.bookkeeper.httpPort }}
    prometheusStatsHttpPort={{ .Values.bookkeeper.httpPort }}
{{- range $k, $v := .Values.bookkeeper.extraConfig }}
    {{ $k }}={{ $v }}
{{- end }}
{{- if .Values.bookkeeper.loggingProperties }}
  logging.properties: |
{{ .Values.bookkeeper.loggingProperties | indent 4 }}
{{- end }}
{{- end }}
