{{- if eq .Values.server.storageMode "remote" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "herddb.fullname" . }}-file-server-config
  labels:
    {{- include "herddb.labels" . | nindent 4 }}
    app.kubernetes.io/component: file-server
data:
  fileserver.properties: |
    port={{ .Values.fileServer.port }}
    bind.host=0.0.0.0
    storage.mode={{ .Values.fileServer.storageMode }}
    {{- if eq .Values.fileServer.storageMode "s3" }}
    {{- if .Values.fileServer.s3.endpoint }}
    s3.endpoint={{ .Values.fileServer.s3.endpoint }}
    {{- else if .Values.minio.enabled }}
    s3.endpoint=http://{{ include "herddb.fullname" . }}-minio:{{ .Values.minio.port }}
    {{- end }}
    {{- if .Values.fileServer.s3.bucket }}
    s3.bucket={{ .Values.fileServer.s3.bucket }}
    {{- else if .Values.minio.enabled }}
    s3.bucket={{ .Values.minio.bucket }}
    {{- end }}
    s3.region={{ .Values.fileServer.s3.region }}
    {{- if .Values.fileServer.s3.accessKey }}
    s3.access.key={{ .Values.fileServer.s3.accessKey }}
    {{- else if .Values.minio.enabled }}
    s3.access.key={{ .Values.minio.adminUser }}
    {{- end }}
    {{- if .Values.fileServer.s3.secretKey }}
    s3.secret.key={{ .Values.fileServer.s3.secretKey }}
    {{- else if .Values.minio.enabled }}
    s3.secret.key={{ .Values.minio.adminPassword }}
    {{- end }}
    {{- if .Values.fileServer.s3.prefix }}
    s3.prefix={{ .Values.fileServer.s3.prefix }}
    {{- end }}
    cache.max.bytes={{ .Values.fileServer.s3.cacheMaxBytes | int64 }}
    {{- end }}
    http.enable=true
    http.port={{ .Values.fileServer.httpPort }}
    http.host=0.0.0.0
{{- end }}
