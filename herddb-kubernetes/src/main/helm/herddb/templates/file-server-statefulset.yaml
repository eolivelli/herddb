{{- if eq .Values.server.storageMode "remote" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "herddb.fullname" . }}-file-server
  labels:
    {{- include "herddb.labels" . | nindent 4 }}
    app.kubernetes.io/component: file-server
spec:
  serviceName: {{ include "herddb.fullname" . }}-file-server
  replicas: {{ .Values.fileServer.replicaCount }}
  selector:
    matchLabels:
      {{- include "herddb.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: file-server
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.fileServer.httpPort }}"
        prometheus.io/path: "/metrics"
      labels:
        {{- include "herddb.labels" . | nindent 8 }}
        app.kubernetes.io/component: file-server
    spec:
      serviceAccountName: {{ include "herddb.serviceAccountName" . }}
      containers:
        - name: file-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.zookeeper.enabled }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              POD_FQDN="${HOSTNAME}.{{ include "herddb.fullname" . }}-file-server.{{ .Release.Namespace }}.svc.cluster.local"
              {{- if .Values.fileServer.s3.credentialsSecret }}
              cp /opt/herddb/conf-ro/fileserver.properties /opt/herddb/conf/fileserver.properties
              echo "s3.access.key=${S3_ACCESS_KEY}" >> /opt/herddb/conf/fileserver.properties
              echo "s3.secret.key=${S3_SECRET_KEY}" >> /opt/herddb/conf/fileserver.properties
              {{- end }}
              exec /opt/herddb/bin/service file-server console \
                /opt/herddb/conf/fileserver.properties \
                --port={{ .Values.fileServer.port }} \
                --data-dir=/opt/herddb/filedata \
                --bind-host=${POD_FQDN}
          {{- else if .Values.fileServer.s3.credentialsSecret }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              cp /opt/herddb/conf-ro/fileserver.properties /opt/herddb/conf/fileserver.properties
              echo "s3.access.key=${S3_ACCESS_KEY}" >> /opt/herddb/conf/fileserver.properties
              echo "s3.secret.key=${S3_SECRET_KEY}" >> /opt/herddb/conf/fileserver.properties
              exec /opt/herddb/bin/service file-server console \
                /opt/herddb/conf/fileserver.properties \
                --port={{ .Values.fileServer.port }} \
                --data-dir=/opt/herddb/filedata
          {{- else }}
          command: ["/opt/herddb/bin/service"]
          args:
            - file-server
            - console
            - "/opt/herddb/conf/fileserver.properties"
            - "--port={{ .Values.fileServer.port }}"
            - "--data-dir=/opt/herddb/filedata"
          {{- end }}
          {{- if or .Values.fileServer.javaOpts .Values.fileServer.s3.credentialsSecret }}
          env:
            {{- if .Values.fileServer.javaOpts }}
            - name: JAVA_OPTS
              value: {{ .Values.fileServer.javaOpts | quote }}
            {{- end }}
            {{- if .Values.fileServer.s3.credentialsSecret }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.fileServer.s3.credentialsSecret }}
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.fileServer.s3.credentialsSecret }}
                  key: S3_SECRET_KEY
            {{- end }}
          {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.fileServer.port }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.fileServer.httpPort }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: {{ .Values.fileServer.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.fileServer.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /opt/herddb/filedata
            {{- if .Values.fileServer.s3.credentialsSecret }}
            - name: config
              mountPath: /opt/herddb/conf-ro
              readOnly: true
            - name: config-writable
              mountPath: /opt/herddb/conf
            {{- else }}
            - name: config
              mountPath: /opt/herddb/conf
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "herddb.fullname" . }}-file-server-config
        {{- if .Values.fileServer.s3.credentialsSecret }}
        - name: config-writable
          emptyDir: {}
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.fileServer.storage.storageClass }}
        storageClassName: {{ .Values.fileServer.storage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.fileServer.storage.size }}
{{- end }}
