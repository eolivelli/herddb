{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "herddb.fullname" . }}-grafana
  labels:
    {{- include "herddb.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "herddb.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "herddb.labels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      serviceAccountName: {{ include "herddb.serviceAccountName" . }}
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
          ports:
            - name: http
              containerPort: {{ .Values.grafana.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
              subPath: datasource.yaml
            - name: config
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: config
              mountPath: /var/lib/grafana/dashboards/herddb-dashboard.json
              subPath: herddb-dashboard.json
            - name: config
              mountPath: /var/lib/grafana/dashboards/indexing-service-dashboard.json
              subPath: indexing-service-dashboard.json
            - name: config
              mountPath: /var/lib/grafana/dashboards/jvm-dashboard.json
              subPath: jvm-dashboard.json
            - name: config
              mountPath: /var/lib/grafana/dashboards/remote-file-service-dashboard.json
              subPath: remote-file-service-dashboard.json
      volumes:
        - name: config
          configMap:
            name: {{ include "herddb.fullname" . }}-grafana-config
{{- end }}
