{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "herddb.fullname" . }}-grafana
  labels:
    {{- include "herddb.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.grafana.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "herddb.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
{{- end }}
