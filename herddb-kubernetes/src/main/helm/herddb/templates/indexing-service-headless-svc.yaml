{{- if .Values.indexingService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "herddb.fullname" . }}-indexing-service
  labels:
    {{- include "herddb.labels" . | nindent 4 }}
    app.kubernetes.io/component: indexing-service
spec:
  clusterIP: None
  selector:
    {{- include "herddb.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: indexing-service
  ports:
    - name: grpc
      port: {{ .Values.indexingService.port }}
      targetPort: grpc
    - name: http
      port: {{ .Values.indexingService.httpPort }}
      targetPort: http
{{- end }}
