{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "herddb.fullname" . }}-prometheus-data
  labels:
    {{- include "herddb.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.prometheus.storage.storageClass }}
  storageClassName: {{ .Values.prometheus.storage.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.prometheus.storage.size }}
{{- end }}
