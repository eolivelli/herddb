apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "herddb.fullname" . }}-server
  labels:
    {{- include "herddb.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  serviceName: {{ include "herddb.fullname" . }}-server
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "herddb.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.server.httpPort }}"
        prometheus.io/path: "/metrics"
      labels:
        {{- include "herddb.labels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: {{ include "herddb.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if eq .Values.server.mode "cluster" }}
      initContainers:
        - name: wait-for-zookeeper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "-c"]
          args:
            - |
              ZK_HOST="{{ include "herddb.fullname" . }}-zookeeper-0.{{ include "herddb.fullname" . }}-zookeeper.{{ .Release.Namespace }}.svc.cluster.local"
              ZK_PORT={{ .Values.zookeeper.clientPort }}
              echo "Waiting for ZooKeeper at ${ZK_HOST}:${ZK_PORT}..."
              while ! (echo ruok 2>/dev/null > /dev/tcp/${ZK_HOST}/${ZK_PORT}); do
                echo "ZooKeeper not ready, retrying in 2s..."
                sleep 2
              done
              echo "ZooKeeper is ready."
      {{- end }}
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/opt/herddb/bin/service"]
          args:
            - server
            - console
            - /opt/herddb/conf/server.properties
          {{- if .Values.server.javaOpts }}
          env:
            - name: JAVA_OPTS
              value: {{ .Values.server.javaOpts | quote }}
          {{- end }}
          ports:
            - name: jdbc
              containerPort: {{ .Values.server.port }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.server.httpPort }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: {{ .Values.server.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          volumeMounts:
            - name: server-config
              mountPath: /opt/herddb/conf/server.properties
              subPath: server.properties
            - name: data
              mountPath: /opt/herddb/data
            - name: commitlog
              mountPath: /opt/herddb/commitlog
      volumes:
        - name: server-config
          configMap:
            name: {{ include "herddb.fullname" . }}-server-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.server.storage.data.storageClass }}
        storageClassName: {{ .Values.server.storage.data.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.server.storage.data.size }}
    - metadata:
        name: commitlog
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.server.storage.commitlog.storageClass }}
        storageClassName: {{ .Values.server.storage.commitlog.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.server.storage.commitlog.size }}
