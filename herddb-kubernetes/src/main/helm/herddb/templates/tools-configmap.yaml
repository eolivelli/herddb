{{- if .Values.tools.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "herddb.fullname" . }}-tools-scripts
  labels:
    {{- include "herddb.labels" . | nindent 4 }}
    app.kubernetes.io/component: tools
data:
  herddb-cli: |
    #!/bin/bash
    exec /opt/herddb/bin/herddb-cli.sh -x "${HERDDB_JDBC_URL}" "$@"
  indexing-admin: |
    #!/bin/bash
    exec /opt/herddb/bin/indexing-admin.sh "$@"
{{- end }}
