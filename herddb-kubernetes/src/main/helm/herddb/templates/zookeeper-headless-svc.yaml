{{- if .Values.zookeeper.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "herddb.fullname" . }}-zookeeper
  labels:
    {{- include "herddb.labels" . | nindent 4 }}
    app.kubernetes.io/component: zookeeper
spec:
  clusterIP: None
  selector:
    {{- include "herddb.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: zookeeper
  ports:
    - name: client
      port: {{ .Values.zookeeper.clientPort }}
      targetPort: {{ .Values.zookeeper.clientPort }}
      protocol: TCP
{{- end }}
