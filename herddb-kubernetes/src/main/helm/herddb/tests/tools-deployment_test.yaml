suite: tools Deployment
templates:
  - templates/tools-deployment.yaml
  - templates/tools-configmap.yaml
tests:
  - it: should render a Deployment when enabled
    template: templates/tools-deployment.yaml
    asserts:
      - isKind:
          of: Deployment

  - it: should have exactly 1 replica
    template: templates/tools-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should use the configured image
    template: templates/tools-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "herddb/herddb-server:0.30.0-SNAPSHOT"

  - it: should sleep as entrypoint
    template: templates/tools-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value: ["sleep"]
      - equal:
          path: spec.template.spec.containers[0].args
          value: ["infinity"]

  - it: should set HERDDB_JDBC_URL env var
    template: templates/tools-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HERDDB_JDBC_URL
            value: "jdbc:herddb:server:RELEASE-NAME-herddb-server-0.RELEASE-NAME-herddb-server.NAMESPACE.svc.cluster.local:7000"

  - it: should mount the tools scripts configmap
    template: templates/tools-deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tools-scripts
            mountPath: /usr/local/bin/herddb-cli
            subPath: herddb-cli

  - it: should not render when disabled
    set:
      tools.enabled: false
    template: templates/tools-deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: configmap should not render when tools disabled
    set:
      tools.enabled: false
    template: templates/tools-configmap.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: configmap should contain the herddb-cli wrapper script
    template: templates/tools-configmap.yaml
    asserts:
      - matchRegex:
          path: data["herddb-cli"]
          pattern: "herddb-cli\\.sh"
      - matchRegex:
          path: data["herddb-cli"]
          pattern: "HERDDB_JDBC_URL"

  - it: should use the configured service account
    template: templates/tools-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-herddb
