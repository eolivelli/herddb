image:
  repository: herddb/herddb-server
  tag: "0.30.0-SNAPSHOT"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  # Override the generated name
  name: ""

# HerdDB server (JDBC endpoint + metadata)
server:
  # Server mode: "standalone", "remote-file-service", or "cluster"
  mode: remote-file-service
  replicaCount: 1
  port: 7000
  httpPort: 9845
  # JVM options (overrides default JAVA_OPTS from setenv.sh)
  javaOpts: ""
  # Extra key=value entries appended to server.properties
  extraConfig: {}
  storage:
    data:
      size: 10Gi
      storageClass: ""
    commitlog:
      size: 5Gi
      storageClass: ""
  resources:
    requests:
      memory: "1Gi"
      cpu: "4"
    limits:
      memory: "1Gi"
      cpu: "4"

# RemoteFileServer (gRPC page storage)
fileServer:
  replicaCount: 2
  port: 9846
  httpPort: 9847
  # Storage backend: "local" (default) or "s3"
  storageMode: local
  # S3 / MinIO configuration (used when storageMode=s3)
  s3:
    # Endpoint URL — leave empty for AWS S3, set for MinIO or compatible services.
    # When minio.enabled=true this is auto-set to the in-cluster MinIO service.
    endpoint: ""
    # Bucket name. When minio.enabled=true defaults to minio.bucket.
    bucket: ""
    region: "us-east-1"
    # Credentials. When minio.enabled=true defaults to minio.adminUser/adminPassword.
    accessKey: ""
    secretKey: ""
    # Optional key prefix within the bucket
    prefix: ""
    # Local disk cache size in bytes (default 1 GB). The PVC is always used as cache dir.
    cacheMaxBytes: 1073741824
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      memory: "1Gi"
      cpu: "4"
    limits:
      memory: "1Gi"
      cpu: "4"

# Optional in-cluster MinIO instance (single-replica, for development / testing).
# When enabled together with fileServer.storageMode=s3, the file server is
# automatically pre-configured to connect to this instance.
minio:
  enabled: false
  adminUser: minioadmin
  adminPassword: minioadmin
  port: 9000
  # Bucket created on startup (used as default s3.bucket for the file server)
  bucket: herddb-pages
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      memory: "512Mi"
      cpu: "0.5"
    limits:
      memory: "512Mi"
      cpu: "0.5"

# Optional in-cluster ZooKeeper instance for cluster mode.
zookeeper:
  enabled: false
  replicaCount: 1
  clientPort: 2181
  javaOpts: ""
  storage:
    size: 2Gi
    storageClass: ""
  resources:
    requests:
      memory: "256Mi"
      cpu: "0.5"
    limits:
      memory: "256Mi"
      cpu: "0.5"

# Optional BookKeeper bookie for cluster mode (requires zookeeper.enabled=true).
bookkeeper:
  enabled: false
  replicaCount: 1
  bookiePort: 3181
  javaOpts: ""
  storage:
    journal:
      size: 2Gi
      storageClass: ""
    ledger:
      size: 5Gi
      storageClass: ""
  resources:
    requests:
      memory: "512Mi"
      cpu: "0.5"
    limits:
      memory: "512Mi"
      cpu: "0.5"

# Tools pod — sleep + pre-configured CLI for kubectl exec
tools:
  enabled: true
  resources:
    requests:
      memory: "256Mi"
      cpu: "0.5"
    limits:
      memory: "256Mi"
      cpu: "0.5"
