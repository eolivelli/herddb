image:
  repository: herddb/herddb-server
  tag: "0.30.0-SNAPSHOT"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  # Override the generated name
  name: ""

# HerdDB server (JDBC endpoint + metadata)
server:
  # Server mode: "standalone" or "cluster"
  mode: standalone
  # Storage mode: "local", "remote", or "bookkeeper"
  storageMode: remote
  replicaCount: 1
  port: 7000
  httpPort: 9845
  # JVM options (overrides default JAVA_OPTS from setenv.sh)
  javaOpts: ""
  # Extra key=value entries appended to server.properties
  extraConfig: {}
  storage:
    data:
      size: 10Gi
      storageClass: ""
    commitlog:
      size: 5Gi
      storageClass: ""
  resources:
    requests:
      memory: "1Gi"
      cpu: "4"
    limits:
      memory: "1Gi"
      cpu: "4"

# RemoteFileServer (gRPC page storage)
fileServer:
  replicaCount: 2
  port: 9846
  httpPort: 9847
  javaOpts: ""
  # Storage backend: "local" (default) or "s3"
  storageMode: local
  # S3 / MinIO configuration (used when storageMode=s3)
  s3:
    # Endpoint URL — leave empty for AWS S3, set for MinIO or compatible services.
    # When minio.enabled=true this is auto-set to the in-cluster MinIO service.
    endpoint: ""
    # Bucket name. When minio.enabled=true defaults to minio.bucket.
    bucket: ""
    region: "us-east-1"
    # Credentials. When minio.enabled=true defaults to minio.adminUser/adminPassword.
    accessKey: ""
    secretKey: ""
    # Name of an existing Kubernetes Secret containing S3_ACCESS_KEY and
    # S3_SECRET_KEY entries. When set, credentials are read from the Secret
    # instead of from accessKey/secretKey above.
    credentialsSecret: ""
    # Optional key prefix within the bucket
    prefix: ""
    # Local disk cache size in bytes (default 1 GB). The PVC is always used as cache dir.
    cacheMaxBytes: 1073741824
  storage:
    size: 10Gi
    storageClass: ""
  extraConfig: {}
  resources:
    requests:
      memory: "1Gi"
      cpu: "4"
    limits:
      memory: "1Gi"
      cpu: "4"

# Optional in-cluster MinIO instance (single-replica, for development / testing).
# When enabled together with fileServer.storageMode=s3, the file server is
# automatically pre-configured to connect to this instance.
minio:
  enabled: false
  adminUser: minioadmin
  adminPassword: minioadmin
  port: 9000
  # Bucket created on startup (used as default s3.bucket for the file server)
  bucket: herddb-pages
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      memory: "512Mi"
      cpu: "0.5"
    limits:
      memory: "512Mi"
      cpu: "0.5"

# Optional in-cluster ZooKeeper instance for cluster mode.
zookeeper:
  enabled: false
  replicaCount: 1
  clientPort: 2181
  metricsPort: 7070
  javaOpts: ""
  storage:
    size: 2Gi
    storageClass: ""
  resources:
    requests:
      memory: "256Mi"
      cpu: "0.5"
    limits:
      memory: "256Mi"
      cpu: "0.5"

# Optional BookKeeper bookie for cluster mode (requires zookeeper.enabled=true).
bookkeeper:
  enabled: false
  replicaCount: 1
  bookiePort: 3181
  httpPort: 8000
  javaOpts: ""
  storage:
    journal:
      size: 2Gi
      storageClass: ""
    ledger:
      size: 5Gi
      storageClass: ""
  resources:
    requests:
      memory: "512Mi"
      cpu: "0.5"
    limits:
      memory: "512Mi"
      cpu: "0.5"
  extraConfig: {}

# Optional IndexingService for vector search (requires zookeeper.enabled=true
# and bookkeeper.enabled=true in cluster mode).
indexingService:
  enabled: false
  replicaCount: 2
  port: 9850
  httpPort: 9851
  javaOpts: ""
  storage:
    data:
      size: 10Gi
      storageClass: ""
    log:
      size: 5Gi
      storageClass: ""
  resources:
    requests:
      memory: "1Gi"
      cpu: "4"
    limits:
      memory: "1Gi"
      cpu: "4"

# Tools pod — sleep + pre-configured CLI for kubectl exec.
# Runs as a StatefulSet with a persistent PVC for vector benchmark datasets.
tools:
  enabled: true
  # JVM options for the CLI (defaults to lightweight settings)
  javaOpts: ""
  storage:
    datasets:
      size: 30Gi
      storageClass: ""
  resources:
    requests:
      memory: "256Mi"
      cpu: "0.5"
    limits:
      memory: "256Mi"
      cpu: "0.5"

# Vector benchmark runner — sleep pod with VectorBench installed and a persistent
# PVC for downloaded datasets (sift1m, gist1m, deep-image-96, ...). Exec into it:
#   kubectl exec -it <release>-vector-bench-0 -- /opt/herddb/bin/vector-bench.sh --dataset sift1m
vectorBench:
  enabled: false
  # JVM heap options, exported as VECTORBENCH_HEAP and read by vector-bench.sh
  javaOpts: "-Xms2g -Xmx8g"
  # Persistent storage for downloaded datasets. PVC is retained across helm
  # upgrades and StatefulSet deletions (whenDeleted/whenScaled: Retain).
  storage:
    datasets:
      size: 100Gi
      storageClass: ""
  resources:
    requests:
      memory: "8Gi"
      cpu: "2"
    limits:
      memory: "12Gi"
      cpu: "4"

# Optional Prometheus instance for scraping HerdDB metrics.
prometheus:
  enabled: false
  image:
    repository: prom/prometheus
    tag: "v2.53.0"
  port: 9090
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      memory: "512Mi"
      cpu: "0.5"
    limits:
      memory: "512Mi"
      cpu: "0.5"

# Optional Grafana instance with pre-provisioned HerdDB dashboards.
grafana:
  enabled: false
  image:
    repository: grafana/grafana
    tag: "11.1.0"
  port: 3000
  resources:
    requests:
      memory: "256Mi"
      cpu: "0.25"
    limits:
      memory: "256Mi"
      cpu: "0.25"
