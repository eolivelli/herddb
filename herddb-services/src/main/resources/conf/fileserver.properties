# RemoteFileServer configuration
# Port to bind. Override on command line: --port=9847
port=9846

# Host/address to bind (0.0.0.0 = all interfaces)
bind.host=0.0.0.0

# Data directory for stored pages.
# Default when unset: fileserver_PORT (relative to working directory)
# data.dir=fileserver_9846

# Storage backend: "local" (default) or "s3"
# storage.mode=local

# S3 / MinIO backend settings (used when storage.mode=s3)
# s3.endpoint=http://localhost:9000
# s3.bucket=herddb-pages
# s3.region=us-east-1
# s3.access.key=
# s3.secret.key=
# s3.prefix=
# cache.max.bytes=1073741824
