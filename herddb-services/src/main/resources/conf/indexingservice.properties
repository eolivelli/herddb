# IndexingService configuration

# gRPC port to bind. Override on command line: --port=9850
port=9850

# Host/address to bind (0.0.0.0 = all interfaces)
bind.host=0.0.0.0

# Data directory for index data.
# Default when unset: indexingservice_PORT (relative to working directory)
# data.dir=indexingservice_9850

# Log directory for commit log tailing.
# Default when unset: indexingservice_PORT_log (relative to working directory)
# log.dir=indexingservice_9850_log

# Cluster metadata directory. Must match server.base.dir+server.metadata.dir of the HerdDB server.
server.metadata.dir=dbdata/metadata

# Server mode (standalone, cluster, diskless-cluster)
server.mode=standalone

# HTTP server for Prometheus metrics
indexing.http.enable=true
indexing.http.port=9851
indexing.http.host=0.0.0.0

# Maximum estimated in-memory bytes for the live-shard snapshot per
# checkpoint cycle (Phase A). When the snapshot would exceed this budget,
# Phase A takes only the oldest shards that fit and defers the rest to the
# next cycle. Prevents pathologically large FusedPQ writes after OOM-recovery
# catch-up (issue #107). 0 = no cap. Default: 10737418240 (10 GiB).
# indexing.vector.maxLiveBytesPerCheckpoint=10737418240
